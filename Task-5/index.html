<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Capstone Project</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ================= NAVBAR ================= -->
    <!-- NAVBAR -->

    <nav class="navbar">

        <h2 class="logo">
            MyShop
        </h2>

        <ul class="nav-links">

            <li>
                <a href="#home">Home</a>
            </li>

            <li>
                <a href="#products">Products</a>
            </li>

            <li>
                <a href="cart.html">

                Cart 🛒

                <span id="cartCount">
                    0
                </span>

            </a>
            </li>

            <li>
                <a href="#contact">Contact</a>
            </li>

        </ul>

    </nav>
    <!-- ================= HERO ================= -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1>
                Modern E-Commerce Website
            </h1>
            <p>
                Responsive web application using HTML, CSS, and JavaScript
            </p>
            <a href="#products">
                <button>
                Shop Now
            </button>
            </a>
        </div>
    </section>
    <!-- ================= PRODUCTS ================= -->
    <section id="products" class="section">
        <h2>
            Products
        </h2>
        <!-- FILTER -->
        <div class="filter-box">
            <select id="filter" onchange="filterProducts()">
            <option value="all">
                All Categories
            </option>
            <option value="electronics">
                Electronics
            </option>
            <option value="fashion">
                Fashion
            </option>
        </select>
            <!-- SORT -->
            <select id="sort" onchange="sortProducts()">
            <option value="default">
                Sort By
            </option>
            <option value="low">
                Price Low to High
            </option>
            <option value="high">
                Price High to Low
            </option>
        </select>
        </div>
        <!-- PRODUCT CARDS -->
        <div id="productContainer" class="grid-container"></div>
    </section>
    <!-- ================= CART ================= 
    <section id="cart" class="section">
        <h2>
            Shopping Cart
        </h2>
        <ul id="cartItems"></ul>
        <h3 id="totalPrice">
            Total: $0
        </h3>
    </section>-->
    <!-- ================= CONTACT ================= -->
    <section id="contact" class="section">
        <h2>
            Contact Us
        </h2>
        <form class="contact-form" onsubmit="sendMessage(event)">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button id="sendBtn" type="submit">
            Send Message
        </button>
            <p id="messageStatus"></p>
        </form>
    </section>
    <!-- ================= FOOTER ================= -->
    <footer>
        <p>
            © 2026 Final Capstone Project
        </p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
